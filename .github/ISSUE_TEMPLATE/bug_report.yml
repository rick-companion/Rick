name: 🐛 Bug Report
description: Report a technical issue or unexpected behavior.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide as much detail as possible to help us resolve the issue. 
        Since Rick is local-first, hardware specs are very helpful!
  - type: textarea
    id: clear_description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment / Hardware
      placeholder: e.g., Windows 11, MacOS (M2), Docker, 16GB RAM, RTX 3060
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: How do we see the bug ourselves?
      placeholder: |
        1. Run 'docker-compose up'
        2. Navigate to localhost:3000
        3. Click on...
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Screenshots
      description: Please paste any error messages from your terminal or browser console.
      render: shell
